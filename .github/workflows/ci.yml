name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked --all-extras --dev

      - name: pytest
        run: uv run pytest

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy src tests

      - name: ty check
        run: uv run ty check
