# =============================================================================
# restic-backup configuration
# =============================================================================
# All user-facing settings live here. backup.sh, install.sh, and the plist
# template source this file — you should rarely need to edit anything else.
# =============================================================================


# -----------------------------------------------------------------------------
# Schedule
# -----------------------------------------------------------------------------
# Day of week: 0=Sunday, 1=Monday, ..., 6=Saturday
BACKUP_WEEKDAY=0

# Time to run the backup (24h format, local time)
BACKUP_HOUR=10
BACKUP_MINUTE=0

# pmset wake time (minutes before backup, to ensure the machine is awake)
PMSET_WAKE_OFFSET_MINUTES=5


# -----------------------------------------------------------------------------
# macOS Keychain
# -----------------------------------------------------------------------------
# These must match what you passed to `security add-generic-password`
# during install (install.sh handles this for you).
KEYCHAIN_ACCOUNT="restic"
KEYCHAIN_SERVICE="restic-backup"


# -----------------------------------------------------------------------------
# Restic repositories (rclone remote names → folder path on the remote)
# These must match the remote names you created via `rclone config`.
# Format: "rclone:<remote_name>:<path>"
# Comment out any repos you don't want active.
# -----------------------------------------------------------------------------
REPOS=(
    "rclone:gdrive:restic-backups"
    "rclone:dropbox:restic-backups"
    "rclone:pcloud:restic-backups"
    # "rclone:mega:restic-backups"   # uncomment to enable
)


# -----------------------------------------------------------------------------
# Source directories to back up
# Use absolute paths. $HOME is expanded at runtime.
# -----------------------------------------------------------------------------
SOURCES=(
    "$HOME/Documents"
    "$HOME/Desktop"
    "$HOME/Projects"
    "$HOME/Pictures"
    "$HOME/Music"
)


# -----------------------------------------------------------------------------
# Exclusions
# Supports restic exclude patterns. Relative paths are matched anywhere.
# See: https://restic.readthedocs.io/en/stable/040_backup.html#excluding-files
# -----------------------------------------------------------------------------
EXCLUDES=(
    # macOS noise
    ".DS_Store"
    ".Spotlight-V100"
    ".Trashes"
    ".fseventsd"

    # Large rebuildable directories
    "node_modules"
    "__pycache__"
    ".venv"
    "venv"
    ".tox"
    "*.egg-info"

    # Build artifacts
    "target"          # Rust
    "dist"
    "build"
    ".gradle"
    ".m2"

    # Temp / cache
    "*.tmp"
    "*.log"
    ".cache"

    # Music production — sample libraries are large and rebuildable from source
    # Uncomment and adjust path if you want to exclude them:
    # "$HOME/Music/Samples"
)


# -----------------------------------------------------------------------------
# Retention policy
# Passed directly to `restic forget --prune` after each successful backup.
# See: https://restic.readthedocs.io/en/stable/060_forget.html
# -----------------------------------------------------------------------------
RETENTION_KEEP_DAILY=7
RETENTION_KEEP_WEEKLY=4
RETENTION_KEEP_MONTHLY=6
RETENTION_KEEP_YEARLY=1


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
LOG_DIR="$HOME/.local/log/restic-backup"
LOG_FILE="$LOG_DIR/backup.log"

# Max log size in bytes before rotation (default: 5MB)
LOG_MAX_BYTES=5242880
