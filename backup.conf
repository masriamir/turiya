# =============================================================================
# turiya configuration
# =============================================================================
# All user-facing settings live here. backup.sh, restore.sh, status.sh,
# query.sh, and install.sh source this file — you should rarely need to
# edit anything else.
#
# Testing hooks (not used in normal operation):
#   TURIYA_CONFIG  — override which config file is sourced
#   RESTIC_PASSWORD       — if already set in the environment, skips the
#                           Keychain lookup entirely
# =============================================================================


# -----------------------------------------------------------------------------
# Schedule
# -----------------------------------------------------------------------------
# Day of week: 0=Sunday, 1=Monday, ..., 6=Saturday
BACKUP_WEEKDAY=0

# Time to run the backup (24h format, local time)
BACKUP_HOUR=10
BACKUP_MINUTE=0

# pmset wake time (minutes before backup, to ensure the machine is awake)
PMSET_WAKE_OFFSET_MINUTES=5


# -----------------------------------------------------------------------------
# macOS Keychain
# -----------------------------------------------------------------------------
# These must match what you passed to `security add-generic-password`
# during install (install.sh handles this for you).
KEYCHAIN_ACCOUNT="restic"
KEYCHAIN_SERVICE="turiya"


# -----------------------------------------------------------------------------
# Restic repositories (rclone remote names → folder path on the remote)
# These must match the remote names you created via `rclone config`.
# Format: "rclone:<remote_name>:<path>"
# Comment out any repos you don't want active.
# -----------------------------------------------------------------------------
REPOS=(
    "rclone:gdrive:turiya-backups"
    "rclone:dropbox:turiya-backups"
    "rclone:pcloud:turiya-backups"
    # "rclone:mega:turiya-backups"   # uncomment to enable
)


# -----------------------------------------------------------------------------
# Source directories to back up
# Use absolute paths. $HOME is expanded at runtime.
# -----------------------------------------------------------------------------
SOURCES=(
    "$HOME/Documents"
    "$HOME/Desktop"
    "$HOME/Projects"
    "$HOME/Pictures"
    "$HOME/Music"
)


# -----------------------------------------------------------------------------
# Exclusions
# Supports restic exclude patterns. Relative paths are matched anywhere.
# See: https://restic.readthedocs.io/en/stable/040_backup.html#excluding-files
# -----------------------------------------------------------------------------
EXCLUDES=(
    # macOS noise
    ".DS_Store"
    ".Spotlight-V100"
    ".Trashes"
    ".fseventsd"

    # Large rebuildable directories
    "node_modules"
    "__pycache__"
    ".venv"
    "venv"
    ".tox"
    "*.egg-info"

    # Build artifacts
    "target"          # Rust
    "dist"
    "build"
    ".gradle"
    ".m2"

    # Temp / cache
    "*.tmp"
    "*.log"
    ".cache"

    # Music production — sample libraries are large and rebuildable from source
    # Uncomment and adjust path if you want to exclude them:
    # "$HOME/Music/Samples"
)


# -----------------------------------------------------------------------------
# Retention policy
# Passed directly to `restic forget --prune` after each successful backup.
# See: https://restic.readthedocs.io/en/stable/060_forget.html
# -----------------------------------------------------------------------------
RETENTION_KEEP_DAILY=7
RETENTION_KEEP_WEEKLY=4
RETENTION_KEEP_MONTHLY=6
RETENTION_KEEP_YEARLY=1


# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
# LOG_DIR holds both human-readable and structured JSON Lines (JSONL) logs.
# File names are derived automatically per operation — there is nothing
# else to configure here:
#   <op>.log     — human-readable (backup.log, restore.log, status.log, query.log)
#   <op>.jsonl   — structured JSONL for that operation only
#   ops.jsonl    — combined structured JSONL across all operations
LOG_DIR="$HOME/.local/log/turiya"

# Max size in bytes before a log file is rotated (default: 5MB). Applies to
# every .log and .jsonl file under LOG_DIR.
LOG_MAX_BYTES=5242880

# When true, every file restic touches during backup/restore gets its own
# JSONL "file" event (action, path, size). Large backups can produce large
# .jsonl files — set to false to keep only run_start/summary/error/run_end
# events.
LOG_JSON_PER_FILE=true
